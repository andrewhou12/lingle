app = "lingle-agent"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.agent"

[env]
  # Non-secret env vars go here. Secrets (API keys) are set via: fly secrets set KEY=value

[[vm]]
  size = "shared-cpu-4x"
  memory = "2gb"

[http_service]
  # The agent doesn't serve HTTP traffic — disable the health check listener
  # so Fly doesn't try to route web traffic to it.
  internal_port = 8081
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
